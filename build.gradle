plugins {
    id "ru.vyarus.use-python" version "4.0.0"
}

python {
    // Installs dependencies from your backend folder
    pip 'backend/requirements.txt'
}

// Task to run your Python tests
task testApp(type: ru.vyarus.gradle.plugin.python.task.PythonTask) {
    command = "-m unittest discover backend"
}

// Main build task (Corrected syntax: dependsOn)
task buildApp {
    dependsOn 'pythonInstall'
    finalizedBy testApp
    doLast {
        println "Build and Tests successful for srishti3718's project."
    }
}