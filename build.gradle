plugins {
    id "com.github.przemyslawswiderski.python-gradle-plugin" version "1.2.2"
}

python {
    // Points to the requirements file inside your backend folder
    requirementsFile = file('backend/requirements.txt')
}

// Task to run your Flask unit tests
task testApp(type: com.github.przemyslawswiderski.python.task.PythonTask) {
    command = "python -m unittest discover backend/tests"
}

// Main build task that orchestrates the environment setup and testing
task buildApp {
    depends on 'installPython'
    depends on 'installPipPackages'
    finalizedBy testApp
    doLast {
        println "Environment prepared and tests executed for srishti3718 project."
    }
}