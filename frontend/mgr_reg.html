<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manager Registration | Leave Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-2xl">
        <h2 class="text-2xl font-bold text-indigo-800 mb-2">Manager Sign Up</h2>
        <p class="text-gray-500 text-sm mb-6">Create your leadership account to manage team requests.</p>

        <form class="space-y-4">
            <input type="hidden" id="regRole" value="manager">
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Full Name</label>
                <input type="text" id="regUsername" placeholder="Manager Name" required
                       class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Email Address</label>
                <input type="email" id="regEmail" placeholder="manager@igdtuw.ac.in" required
                       class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Manager ID (User ID)</label>
                <input type="text" id="regUserId" placeholder="MGR101" required
                       class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="regPass" placeholder="••••••••" required
                       class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Confirm Password</label>
                <input type="password" id="regRePass" placeholder="••••••••" required
                       class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 italic">Access Code (Verify again)</label>
                <input type="password" id="regKey" placeholder="Enter MGR2026" required
                       class="w-full p-2.5 border border-gray-300 rounded-lg bg-gray-50 outline-none">
            </div>

            <button type="button" onclick="registerUser(event)" 
                    class="w-full bg-indigo-700 text-white font-bold py-3 rounded-lg hover:bg-indigo-800 transition shadow-lg">
                Register as Manager
            </button>
            
            <p id="regMessage" class="mt-4 text-center text-sm font-semibold"></p>
            <div class="text-center mt-4">
                <a href="index.html" class="text-indigo-600 text-sm hover:underline">Back to Login</a>
            </div>
        </form>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
