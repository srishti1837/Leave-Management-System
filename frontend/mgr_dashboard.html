<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Portal | Leave Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100">

    <nav class="bg-slate-800 border-b border-slate-700 p-4 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-600 p-2 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Manager Dashboard</h1>
            </div>
            <div class="flex items-center gap-6">
                <div id="mgrInfo" class="text-right hidden md:block">
                    <p id="mgrName" class="text-sm font-bold text-white"></p>
                    <p id="mgrIdDisplay" class="text-xs text-slate-400"></p>
                </div>
                <button onclick="logout()" class="bg-slate-700 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200">
                    Logout
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-12">
        
        <section>
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold flex items-center gap-2">
                    <span class="w-2 h-8 bg-indigo-500 rounded-full"></span>
                    Pending Requests
                </h2>
                <span id="pendingCount" class="bg-indigo-900 text-indigo-300 px-3 py-1 rounded-full text-xs font-bold border border-indigo-700">0 Total</span>
            </div>
            
            <div class="bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-700/50 text-slate-400 text-xs uppercase tracking-wider">
                        <tr>
                            <th class="p-4">Employee</th>
                            <th class="p-4">Reason & Type</th>
                            <th class="p-4">Dates</th>
                            <th class="p-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="mgrTaskTable" class="divide-y divide-slate-700">
                        </tbody>
                </table>
            </div>
        </section>

        <section>
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold flex items-center gap-2">
                    <span class="w-2 h-8 bg-emerald-500 rounded-full"></span>
                    My Team
                </h2>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="mgrTeamGrid">
                </div>
        </section>
    </main>

    <div id="historyModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/90 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-2xl shadow-2xl overflow-hidden transform transition-all">
            <div class="bg-slate-50 p-6 border-b flex justify-between items-center">
                <div>
                    <h3 id="modalTitle" class="text-xl font-bold text-slate-800"></h3>
                    <p id="modalSubtitle" class="text-sm text-slate-500"></p>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 p-2 rounded-full hover:bg-slate-100 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="p-6 overflow-y-auto max-h-[60vh]">
                <table class="w-full text-left">
                    <thead class="text-slate-400 text-xs uppercase border-b">
                        <tr>
                            <th class="pb-3">Type</th>
                            <th class="pb-3">Dates</th>
                            <th class="pb-3">Status</th>
                        </tr>
                    </thead>
                    <tbody id="modalHistoryBody" class="divide-y text-slate-700">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/mgr_dashboard.js"></script>
</body>
</html>
