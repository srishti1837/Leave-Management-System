<!DOCTYPE html>
<html lang="en">
<head>
    <title>Employee Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-blue-700 p-4 text-white flex justify-between items-center shadow-md">
        <h1 class="font-bold">Employee Portal</h1>
        <div><span id="empWelcome"></span> | <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded ml-2">Logout</button></div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 grid md:grid-cols-3 gap-6">
        <section class="bg-white p-6 rounded-lg shadow border">
            <h2 class="text-lg font-bold mb-4">Apply for Leave</h2>
            <form id="leaveForm" class="space-y-4">
                <select id="leaveType" class="w-full p-2 border rounded"><option value="Sick">Sick</option><option value="Casual">Casual</option></select>
                <input type="date" id="startDate" class="w-full p-2 border rounded">
                <input type="date" id="endDate" class="w-full p-2 border rounded">
                <textarea id="leaveReason" placeholder="Reason for leave..." class="w-full p-2 border rounded h-24"></textarea>
                <button type="button" onclick="submitLeave()" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">Submit Request</button>
            </form>
            <p id="leaveStatusMsg" class="mt-2 text-center text-sm"></p>
        </section>

        <section class="md:col-span-2 bg-white p-6 rounded-lg shadow border">
            <h2 class="text-lg font-bold mb-4">My Leave History</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-xs uppercase text-gray-500">
                        <tr><th class="p-3">Type</th><th class="p-3">Dates</th><th class="p-3">Reason</th><th class="p-3">Status</th></tr>
                    </thead>
                    <tbody id="empHistoryTable"></tbody>
                </table>
            </div>
        </section>
    </main>
    <script src="js/emp_dashboard.js"></script>
</body>
</html>
