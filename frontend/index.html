<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Leave Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-4xl w-full bg-white rounded-xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
        
        <div class="md:w-1/2 bg-blue-800 p-12 text-white flex flex-col justify-center">
            <h1 class="text-4xl font-bold mb-6">Leave Portal</h1>
            <p class="text-blue-100 text-lg mb-8">
                IGDTUW DevOps Project: A streamlined way to manage and track employee leave requests.
            </p>
            <div class="border-t border-blue-700 pt-8">
                <h3 class="text-xl font-semibold mb-4">New here?</h3>
                <p class="text-sm text-blue-200 mb-4">Enter your institutional access code to create your account.</p>
                
                <div class="space-y-3">
                    <input type="password" id="accessCodeInput" placeholder="Enter Access Code" 
                           class="w-full p-3 rounded bg-blue-900 border border-blue-700 text-white placeholder-blue-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    
                    <button onclick="checkAccessCode()" 
                            class="w-full bg-white text-blue-800 font-bold py-3 rounded hover:bg-blue-50 transition duration-300">
                        Join Now
                    </button>
                </div>
                <p id="accessMessage" class="mt-2 text-xs font-semibold"></p>
            </div>
        </div>

        <div class="md:w-1/2 p-12">
            <h2 class="text-3xl font-bold text-gray-800 mb-8">Login</h2>
            
            <form class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Employee/Manager ID</label>
                    <input type="text" id="loginId" placeholder="" required
                           class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" id="loginPass" placeholder="••••••••" required
                           class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <button type="button" onclick="login()" 
                        class="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700 transition duration-300 shadow-lg">
                    Sign In
                </button>

                <p id="loginMessage" class="mt-4 text-center text-sm font-semibold"></p>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>

    <script>
        // Gatekeeper logic for registration
        function checkAccessCode() {
            const code = document.getElementById('accessCodeInput').value;
            const message = document.getElementById('accessMessage');

            // Replace these with your actual IGDTUW project codes
            const EMP_CODE = "EMP2026"; 
            const MGR_CODE = "MGR2026";

            if (code === EMP_CODE) {
                window.location.href = "emp_reg.html";
            } else if (code === MGR_CODE) {
                window.location.href = "mgr_reg.html";
            } else {
                message.innerText = "Invalid Access Code!";
                message.className = "mt-2 text-xs font-semibold text-red-300";
            }
        }
    </script>
</body>
</html>
