apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sqlite-pvc      # This name must match what's in your deployment.yaml
spec:
  accessModes:
    - ReadWriteOnce      # Allows one pod to read/write at a time
  resources:
    requests:
      storage: 1Gi       # Reserves 1GB of space for your .db file